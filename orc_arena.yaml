# orc-arena default configuration.
# All warrior + judge calls route through the orq.ai router gateway.

# Match rules (hybrid: HP + round cap)
match:
  starting_hp: 100
  max_rounds: 5
  damage_unanimous: 30    # 3-0 verdict
  damage_majority: 15     # 2-1 verdict
  damage_tie: 0           # tie doesn't count toward round cap

# Orq.ai gateway
gateway:
  base_url: https://api.orq.ai/v2/router
  api_key_env: ORQ_API_KEY
  # Concurrency for warrior + judge calls per fight.
  concurrency: 4
  # Per-warrior max output tokens for a single prompt turn.
  warrior_max_tokens: 1024
  # Judge max tokens (short verdicts).
  judge_max_tokens: 512

# The roster — 8 warriors seeded 1..8 for single elimination.
warriors:
  - orc_name: Grak the Thoughtful
    model_id: anthropic/claude-opus-4-7
    emblem: "⚔"
  - orc_name: Thrall Swiftclaw
    model_id: anthropic/claude-sonnet-4-6
    emblem: "🗡"
  - orc_name: Morgoth Quadskull
    model_id: openai/gpt-4o
    emblem: "⚒"
  - orc_name: Snot the Quick
    model_id: openai/gpt-4o-mini
    emblem: "🏹"
  - orc_name: Azog Deepmind
    model_id: google/gemini-2.5-pro
    emblem: "🛡"
  - orc_name: Gruk Flashfist
    model_id: google/gemini-2.5-flash
    emblem: "🔥"
  - orc_name: Bolg the Seeker
    model_id: deepseek/deepseek-v3
    emblem: "🪓"
  - orc_name: Ugluk Stormcaller
    model_id: mistral/mistral-large
    emblem: "⚡"

# Judge panel — fixed 3 judges, majority vote.
judges:
  - name: Haiku
    model_id: anthropic/claude-haiku-4-5
  - name: Flash
    model_id: google/gemini-2.5-flash
  - name: 4o-mini
    model_id: openai/gpt-4o-mini

# Judge system prompt, used verbatim.
judge_system_prompt: |
  You are an expert judge evaluating AI assistant responses. Be impartial and
  focus on accuracy, helpfulness, clarity, and relevance. Respond only with
  a brief reasoning followed by a verdict (A, B, or TIE).
