# orq-arena default configuration.
# All candidate + judge calls route through the orq.ai router gateway.

# Match rules. max_rounds caps the decisive rounds per match; starting_hp and
# the damage_* tiers drive the live TUI health bars only (the rating never
# sees them, it's fed per-round verdicts).
match:
  max_rounds: 5
  starting_hp: 100
  damage_unanimous: 30    # all decisive votes agree (minimum 2)
  damage_majority: 15     # split decision

# Orq.ai gateway
gateway:
  base_url: https://api.orq.ai/v3/router
  api_key_env: ORQ_API_KEY
  # Per-response output cap. Creative prompts overflow 1024 easily; a cut
  # response shows as ✂ truncated and judges punish it. Per-candidate
  # max_tokens overrides this.
  candidate_max_tokens: 2048
  # Cap, not target, costs nothing on frugal judges, and thinking-by-default
  # judges (e.g. gemini-2.5-flash) burn ~500 reasoning tokens before the
  # verdict; 512 starves them into failed votes.
  judge_max_tokens: 2048
  # Max silence between stream chunks (seconds). Generous: thinking models may
  # pause for minutes before the first token. Never a total-duration cap.
  stream_read_timeout_s: 1200
  judge_timeout_ms: 90000

# The model pool, any size >= 2. Default pool is uniform thinking-OFF for a
# fair apples-to-apples ELO; see configs/reasoning_arena.yaml for the
# uniform thinking-ON counterpart.
#
# reasoning: raw router fields, forwarded verbatim. Recipes:
#   OpenAI  -> reasoning: { reasoning_effort: low|medium|high }
#   Claude  -> reasoning: { thinking: { type: enabled, budget_tokens: 4096 } }
#   Gemini3 -> reasoning: { thinking: { thinking_level: low|high } }
candidates:
  - model_id: anthropic/claude-opus-4-8
  - model_id: anthropic/claude-sonnet-4-6
  - model_id: openai/gpt-5.4
  - model_id: openai/gpt-5.4-mini
  - model_id: google/gemini-3.1-pro-preview
    # think-by-default model: explicitly disabled for the uniform-OFF pool
    # (router coerces disable to its minimum on thinking-enforced models)
    reasoning: { thinking: { type: disabled } }
  - model_id: google/gemini-3.5-flash
    reasoning: { thinking: { type: disabled } }
  - model_id: deepseek/deepseek-chat
  - model_id: mistral/mistral-medium-2604
# Excluded from the default pool (thinking can't be disabled via the router,
# verified 2026-07-11): moonshotai/kimi-k2.6, deepseek/deepseek-v4-pro,
# alibaba/qwen3.5-flash. They belong in configs/reasoning_arena.yaml.

# Judge panel, router model ids, judged via evaluatorq's pairwise jury
# (both orderings per judge; a judge that flips abstains and is recorded).
# None of these are candidates, so self-judge exclusion stays dormant here.
#
# Presets, pick your panel for the job:
#   demo (default): cheap trio below, fast, pennies, fine for the show.
#   strong: frontier judges for numbers you intend to defend, e.g.
#     - anthropic/claude-opus-4-8
#     - openai/gpt-5.4
#     - google/gemini-3.1-pro-preview
#   (expect ~10× judge cost; agreement stats will tell you if it mattered.
#    measured 2026-07-12 over a 140-round log: same champion, Spearman 0.81
#    vs the cheap trio's ranking, still 22-30% flips. If you do this, raise
#    judge_max_tokens to ~8000 and judge_timeout_ms to ~180000: thinking
#    judges burn ~2k reasoning tokens and opus can exceed 90s per verdict.)
judges:
  - anthropic/claude-haiku-4-5-20251001
  - google/gemini-2.5-flash-lite
  - openai/gpt-5.4-nano

# Neutral stand-ins promoted when a primary judge errors. Kept above the primary
# panel on the Artificial Analysis intelligence index (mistral-medium-2604 ~30,
# vs the cheap trio ~12-18) so a stand-in never weakens a verdict. NB: don't
# reach for mistral-large-2411 here, it's the old Large 2 (AA ~9), weaker.
replacement_judges:
  - mistral/mistral-medium-2604

# What the jury judges on (feeds evaluatorq's pairwise criteria).
criteria: >-
  Accuracy and correctness, helpfulness and completeness, clarity, and
  relevance to the prompt.

# Fewer decisive reconciled votes than this -> round is inconclusive
# (no damage, no round-cap tick). Guards against jury-of-one verdicts.
min_successful_judges: 2
