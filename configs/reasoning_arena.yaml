# orq-arena, reasoning pool: the "does thinking help?" benchmark.
# Uniform thinking-ON counterpart of the default orq_arena.yaml.
# Run: orq-arena run --config configs/reasoning_arena.yaml

match:
  max_rounds: 5
  starting_hp: 100        # TUI health-bar knobs only; the rating ignores them
  damage_unanimous: 30
  damage_majority: 15

gateway:
  base_url: https://api.orq.ai/v3/router
  # Thinking eats output budget on some providers; give answers headroom.
  candidate_max_tokens: 16000
  judge_max_tokens: 2048
  stream_read_timeout_s: 1200
  judge_timeout_ms: 90000

candidates:
  - model_id: anthropic/claude-opus-4-8
    reasoning: { thinking: { type: enabled, budget_tokens: 4096 } }
  - model_id: anthropic/claude-sonnet-4-6
    reasoning: { thinking: { type: enabled, budget_tokens: 4096 } }
  - model_id: openai/gpt-5.4
    reasoning: { reasoning_effort: medium }
  - model_id: openai/gpt-5.1
    reasoning: { reasoning_effort: medium }
  - model_id: google/gemini-3.1-pro-preview
    reasoning: { thinking: { thinking_level: high } }
  - model_id: moonshotai/kimi-k2.6      # always-thinking by model design

  - model_id: deepseek/deepseek-reasoner   # always-thinking model
  - model_id: deepseek/deepseek-v4-pro     # reasoning-native (kimi-k2-thinking was 404 in-workspace)

judges:
  - anthropic/claude-haiku-4-5-20251001
  - google/gemini-2.5-flash-lite
  - openai/gpt-5.4-nano

replacement_judges:
  - mistral/mistral-medium-2604

criteria: >-
  Accuracy and correctness, depth and soundness of reasoning, helpfulness and
  completeness, clarity, and relevance to the prompt.

min_successful_judges: 2
