# Budget pool: 8 small/fast models, one per provider. "Which cheap model wins
# on my prompts?" for the workloads where you won't pay frontier prices.
#
# Coherent tier: the ~12-25 band of the Artificial Analysis intelligence index
# (source: orquesta-web autorouter-intelligence). Maximum provider diversity,
# one model each from anthropic, openai, google, deepseek, mistral, xai,
# alibaba, cohere. The preflight thinking-probe reports each model's actual
# reasoning status; only gemini is explicitly pinned thinking-OFF here.
#
# Run: orq-arena run --config configs/budget_8.yaml --prompts your_prompts.jsonl

candidates:
  - model_id: anthropic/claude-3-5-haiku-20241022      # AA 12.3
  - model_id: openai/gpt-5.4-mini                       # AA 16.6 (non-reasoning)
  - model_id: google/gemini-3.1-flash-lite-preview      # AA 25.0
    reasoning: { thinking: { type: disabled } }
  - model_id: deepseek/deepseek-chat                    # AA ~14-24 (V3 family)
  - model_id: mistral/mistral-small-2603                # AA ~12-20
  - model_id: xai/grok-4-1-fast                         # AA 16.9 (non-reasoning)
  - model_id: alibaba/qwen3-max-2026-01-23              # AA 24.0
  - model_id: cohere/command-nightly

judges:
  - anthropic/claude-haiku-4-5-20251001
  - google/gemini-2.5-flash-lite
  - openai/gpt-5.4-nano

replacement_judges:
  - mistral/mistral-medium-2604   # AA ~30, above the candidate pool

criteria: >-
  Accuracy and correctness, helpfulness and completeness, clarity, and
  relevance to the prompt.

min_successful_judges: 2
