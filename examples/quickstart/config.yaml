# Example roster for the committed quickstart run (examples/quickstart/).
# A small 4-model, thinking-OFF pool so the example is fast and cheap to
# reproduce. Regenerate with:
#   orq-arena run --config examples/quickstart/config.yaml \
#     --prompts prompts/starter.jsonl -y --no-open \
#     --output examples/quickstart/battles.jsonl

match:
  max_rounds: 5
  starting_hp: 100
  damage_unanimous: 30
  damage_majority: 15

gateway:
  base_url: https://api.orq.ai/v3/router
  api_key_env: ORQ_API_KEY

preflight:
  thinking_probe: true

candidates:
  - model_id: openai/gpt-5.4-mini
  - model_id: anthropic/claude-sonnet-4-6
  - model_id: google/gemini-3.5-flash
    reasoning: { thinking: { type: disabled } }
  - model_id: mistral/mistral-medium-2604

judges:
  - anthropic/claude-haiku-4-5-20251001
  - google/gemini-2.5-flash-lite
  - openai/gpt-5.4-nano

replacement_judges:
  - mistral/mistral-small-2603
